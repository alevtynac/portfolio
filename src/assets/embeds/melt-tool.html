      let outG = bgG * (1 - finalA) + g * finalA;
      let outB = bgB * (1 - finalA) + b * finalA;

      // Glow (additive, approximated by brightening near text)
      if (finalA > 0.01) {
        outR += finalA * glowIntensity * 0.3 * r;
        outG += finalA * glowIntensity * 0.3 * g;
        outB += finalA * glowIntensity * 0.3 * b;
      }

      // Vignette
      outR *= vigMix;
      outG *= vigMix;
      outB *= vigMix;

      // Grain
      const grainVal = (hash(x + Math.floor(time * 7.13) * 1000, y + Math.floor(time * 3.71) * 1000) - 0.5) * grainIntensity * 0.15;
      outR += grainVal;
      outG += grainVal;
      outB += grainVal;

      // Dust
      const dustVal = hash(Math.floor(uvx * 300), Math.floor(uvy * 300) + Math.floor(time * 0.5)) > 0.9985 ? 0.08 : 0;
      outR += dustVal;
      outG += dustVal;
      outB += dustVal;

      // Clamp and write
      outR = Math.max(0, Math.min(1, outR));
      outG = Math.max(0, Math.min(1, outG));
      outB = Math.max(0, Math.min(1, outB));

      // Write to output (fill STEP x STEP block)
      for (let dy2 = 0; dy2 < STEP && y + dy2 < h; dy2++) {
        for (let dx2 = 0; dx2 < STEP && x + dx2 < w; dx2++) {
          const idx = ((y + dy2) * w + (x + dx2)) * 4;
          out[idx] = outR * 255;
          out[idx+1] = outG * 255;
          out[idx+2] = outB * 255;
          out[idx+3] = 255;
        }
      }
    }
  }

  meltCtx.putImageData(outData, 0, 0);

  // Draw to main canvas
  ctx.clearRect(0, 0, w, h);
  ctx.drawImage(meltCanvas, 0, 0);

  // Bloom pass — draw bright areas with blur
  if (glowIntensity > 0.01) {
    const bw = bloomCanvas.width;
    const bh = bloomCanvas.height;
    bloomCtx.clearRect(0, 0, bw, bh);
    bloomCtx.globalAlpha = 1;
    bloomCtx.drawImage(meltCanvas, 0, 0, bw, bh);
    bloomCtx.globalCompositeOperation = 'source-atop';
    bloomCtx.fillStyle = 'rgba(0,0,0,0.6)';
    bloomCtx.fillRect(0, 0, bw, bh);
    bloomCtx.globalCompositeOperation = 'source-over';

    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = glowIntensity * 0.5;
    ctx.filter = 'blur(' + Math.round(8 + glowIntensity * 20) + 'px)';
    ctx.drawImage(bloomCanvas, 0, 0, w, h);
    ctx.filter = 'none';
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  }

  requestAnimationFrame(render);
}

// Load font then start
document.fonts.load('400 280px "Anton"').then(function() {
  textNeedsUpdate = true;
  requestAnimationFrame(render);
}).catch(function() {
  textNeedsUpdate = true;
  requestAnimationFrame(render);
});

    }

    
  </script>
